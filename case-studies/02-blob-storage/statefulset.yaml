apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: blob
spec:
  serviceName: "postgres"    # must match headless Service name
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: blob-ksa    # Workload Identity SA
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: blobstore
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:                # each pod gets its own PVC
  - metadata:
      name: pg-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: ssd            # your custom StorageClass
      resources:
        requests:
          storage: 20Gi