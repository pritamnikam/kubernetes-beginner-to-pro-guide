<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>K8s Noob → Pro · GKE Learning Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0a0c10;--ink2:#111520;--ink3:#161c28;
  --border:#1e2a3a;--border2:#253347;
  --cyan:#00e5ff;--lime:#a8ff3e;--amber:#ffb830;--rose:#ff4d6d;--violet:#b06dff;--sky:#4db8ff;
  --text:#dce8f0;--muted:#6b8ea8;--faint:#2a3d52;
  --mono:'IBM Plex Mono',monospace;
  --head:'Bebas Neue',sans-serif;
  --body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--ink);color:var(--text);overflow-x:hidden;min-height:100vh}

/* BG */
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(0,229,255,.05) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 110%,rgba(168,255,62,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 28px}

/* ══ HERO ══ */
.hero{padding:56px 0 48px;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--cyan);background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.18);
  border-radius:100px;padding:5px 16px;margin-bottom:32px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);
  box-shadow:0 0 8px var(--lime);animation:livepulse 2s ease-in-out infinite}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
h1{font-family:var(--head);font-size:clamp(52px,9vw,110px);line-height:.95;letter-spacing:.02em;margin-bottom:20px}
h1 .g1{color:var(--cyan);text-shadow:0 0 60px rgba(0,229,255,.3)}
h1 .g2{color:var(--text);opacity:.3}
h1 .g3{color:var(--lime);text-shadow:0 0 60px rgba(168,255,62,.3)}
.hero-sub{font-size:16px;color:var(--muted);max-width:580px;margin:0 auto 44px;line-height:1.7}

/* ══ XP BAR ══ */
.xp-strip{display:flex;align-items:center;gap:14px;
  background:var(--ink2);border:1px solid var(--border);border-radius:14px;
  padding:14px 20px;margin-bottom:48px;flex-wrap:wrap}
.xp-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);white-space:nowrap}
.xp-track{flex:1;height:6px;background:var(--faint);border-radius:3px;min-width:100px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--lime));
  transition:width .6s cubic-bezier(.4,0,.2,1);width:0%}
.xp-val{font-family:var(--mono);font-size:12px;color:var(--lime);
  background:rgba(168,255,62,.08);border:1px solid rgba(168,255,62,.2);
  border-radius:6px;padding:3px 10px;white-space:nowrap}
.xp-rank{font-family:var(--mono);font-size:11px;color:var(--amber);
  background:rgba(255,184,48,.07);border:1px solid rgba(255,184,48,.18);
  border-radius:6px;padding:3px 10px;white-space:nowrap}

/* ══ SECTION HEADER ══ */
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.sec-hdr span{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--faint)}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

/* ══ CASE GRID ══ */
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:14px}

.ccard{background:var(--ink2);border:1px solid var(--border);border-radius:14px;
  padding:22px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.ccard::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% -10%,var(--cc,rgba(0,229,255,.1)) 0%,transparent 70%);
  opacity:0;transition:opacity .3s}
.ccard:hover{border-color:var(--cc-border,rgba(0,229,255,.4));transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,.5)}
.ccard:hover::after{opacity:1}
.ccard.sel{border-color:var(--cc-border,rgba(0,229,255,.5));background:var(--ink3);
  box-shadow:0 0 0 1px var(--cc-border,rgba(0,229,255,.15)),0 16px 48px rgba(0,0,0,.5)}
.ccard.sel::after{opacity:1}

.cc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.cc-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;border:1px solid rgba(255,255,255,.07)}
.cc-name{font-family:var(--head);font-size:22px;letter-spacing:.04em;line-height:1}
.cc-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.04em}
.cc-desc{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.cc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ctag{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid;
  text-transform:uppercase;letter-spacing:.06em}
.cc-foot{display:flex;align-items:center;justify-content:space-between}
.cc-diff{display:flex;gap:3px;align-items:center}
.dbar{width:16px;height:3px;border-radius:2px;background:var(--faint)}
.dbar.on{background:var(--cc-border,var(--cyan))}
.dlbl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:5px}
.cc-btn{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;
  padding:5px 12px;border-radius:6px;border:1px solid var(--cc-border,rgba(0,229,255,.4));
  color:var(--cc-border,var(--cyan));background:transparent;cursor:pointer;transition:all .2s}
.cc-btn:hover,.ccard.sel .cc-btn{background:var(--cc-border,var(--cyan));color:var(--ink)}

/* ══ DETAIL PANEL ══ */
.detail{background:var(--ink2);border:1px solid var(--border);border-radius:16px;
  margin-bottom:48px;overflow:hidden;display:none;animation:fadein .3s ease}
.detail.on{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.d-hero{padding:32px 36px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
.d-ico{font-size:44px}
.d-info{flex:1}
.d-title{font-family:var(--head);font-size:40px;letter-spacing:.04em;line-height:1}
.d-sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px}
.d-close{background:none;border:1px solid var(--border);color:var(--muted);
  width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:auto}
.d-close:hover{border-color:var(--rose);color:var(--rose)}

/* TABS */
.tabs{display:flex;gap:2px;padding:0 36px;border-bottom:1px solid var(--border);
  background:var(--ink);overflow-x:auto}
.tab{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;
  padding:12px 18px;border-bottom:2px solid transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.on{color:var(--d-accent,var(--cyan));border-bottom-color:var(--d-accent,var(--cyan))}

.d-body{padding:32px 36px}
.pane{display:none}
.pane.on{display:block}

/* ══ EXECUTIVE SUMMARY ══ */
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
@media(max-width:700px){.exec-grid{grid-template-columns:1fr}}
.exec-card{background:var(--ink3);border:1px solid var(--border);border-radius:12px;padding:20px}
.ec-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.15em;
  color:var(--muted);margin-bottom:8px}
.ec-val{font-size:14px;line-height:1.6;color:var(--text)}
.ec-val.big{font-family:var(--head);font-size:28px;letter-spacing:.04em}
.exec-bar{background:var(--ink3);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.exec-para{font-size:14px;line-height:1.8;color:var(--muted);margin-bottom:16px}
.exec-para strong{color:var(--text)}
.highlight-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.hl-chip{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);
  border-radius:8px;padding:10px 16px;font-size:13px;color:var(--cyan)}
.hl-chip b{display:block;font-family:var(--mono);font-size:18px;color:var(--cyan);margin-bottom:2px}
.hl-chip span{font-size:11px;color:var(--muted)}
.learn-list{list-style:none}
.learn-list li{display:flex;align-items:flex-start;gap:10px;font-size:13px;
  color:var(--muted);padding:7px 0;border-bottom:1px solid var(--faint)}
.learn-list li:last-child{border-bottom:none}
.learn-list li::before{content:'▸';color:var(--d-accent,var(--cyan));flex-shrink:0;margin-top:1px}

/* ══ BUILDING BLOCKS ══ */
.bb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.bb-card{background:var(--ink3);border:1px solid var(--border);border-radius:12px;overflow:hidden;
  transition:border-color .2s}
.bb-card:hover{border-color:var(--border2)}
.bb-head{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.bb-icon{font-size:18px}
.bb-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.bb-kind{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;
  padding:2px 6px;border-radius:4px;border:1px solid;margin-left:auto}
.bb-body{padding:14px 16px}
.bb-sig{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.bb-why{font-family:var(--mono);font-size:10px;color:var(--d-accent,var(--cyan));
  background:rgba(0,229,255,.05);border-radius:6px;padding:8px 10px;line-height:1.5}

/* ══ PHASES ══ */
.phase-list{display:flex;flex-direction:column;gap:10px}
.phase{background:var(--ink3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.phase-hdr{padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:background .2s}
.phase-hdr:hover{background:rgba(255,255,255,.02)}
.ph-num{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:13px;font-weight:700;flex-shrink:0;
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.15);color:var(--cyan)}
.ph-info{flex:1}
.ph-title{font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;margin-bottom:2px}
.ph-desc{font-size:12px;color:var(--muted)}
.ph-chev{color:var(--faint);font-size:12px;transition:transform .2s}
.phase.open .ph-chev{transform:rotate(90deg);color:var(--cyan)}
.phase-body{display:none;padding:0 18px 16px}
.phase.open .phase-body{display:block}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;
  border-bottom:1px solid var(--faint);font-size:12.5px;color:var(--muted)}
.task-row:last-child{border-bottom:none}
.tck{width:18px;height:18px;border-radius:5px;border:1px solid var(--border2);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .2s;margin-top:1px}
.tck.done{background:var(--lime);border-color:var(--lime);color:var(--ink);font-weight:700}
.task-row.done-row{opacity:.5}
.task-row.done-row .tck-text{text-decoration:line-through}

/* ══ YAML / COMMANDS ══ */
.yaml-section{margin-bottom:24px}
.ys-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;
  color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ys-label::after{content:'';flex:1;height:1px;background:var(--border)}
.code-block{background:#070c12;border:1px solid var(--border);border-radius:10px;
  padding:18px;margin-bottom:12px;position:relative;overflow-x:auto}
.code-block pre{font-family:var(--mono);font-size:12px;line-height:1.75;color:#c9d8e8}
.code-block .cm{color:#3a5a72}
.code-block .ky{color:#b06dff}
.code-block .vl{color:#a8ff3e}
.code-block .st{color:#ffb830}
.code-block .op{color:#00e5ff}
.code-block .kw{color:#ff6b9d}
.cb-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);background:var(--ink3);border:1px solid var(--border);
  border-radius:4px;padding:2px 8px;margin-bottom:10px;display:inline-block}

/* ══ ARCH ══ */
.arch-box{background:#070c12;border:1px solid var(--border);border-radius:10px;
  padding:20px 24px;overflow-x:auto;margin-bottom:20px}
.arch-box pre{font-family:var(--mono);font-size:12px;line-height:1.75;color:var(--d-accent,var(--cyan))}

/* ══ CONCEPT CHIPS ══ */
.concept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
.con-card{background:var(--ink3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
  border-left:3px solid var(--d-accent,var(--cyan))}
.con-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.con-sub{font-size:11px;color:var(--muted);line-height:1.5}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:600px){
  .d-body{padding:20px 18px}
  .tabs{padding:0 18px}
  .d-hero{padding:20px 18px 16px}
  .bb-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow"><span class="live-dot"></span>Google Kubernetes Engine · Hands-On Track · 8 Case Studies</div>
  <h1><span class="g1">K8S</span><br><span class="g2">NOOB</span> <span class="g3">→ PRO</span></h1>
  <p class="hero-sub">Learn by building real production systems. Every case study reveals deeper Kubernetes primitives — from your first Pod to multi-cluster operators.</p>
</div>

<!-- XP BAR -->
<div class="xp-strip">
  <span class="xp-label">Progress</span>
  <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
  <div class="xp-val" id="xpVal">0 XP</div>
  <div class="xp-rank" id="xpRank">🌱 Cluster Newbie</div>
</div>

<div class="sec-hdr"><span>Choose Your Mission · 8 Case Studies</span></div>
<div class="case-grid" id="caseGrid"></div>
<div class="detail" id="detailPanel"></div>

</div><!-- /wrap -->

<script>
// ══════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════
const CASES = [
{
  id:'url',icon:'🔗',title:'URL SHORTENER',sub:'10k rps · stateless api',
  color:'#00e5ff',cborder:'rgba(0,229,255,.45)',cbg:'rgba(0,229,255,.08)',
  diff:1,dlbl:'Beginner',
  desc:'The perfect first app. Stateless API + Redis cache teaches you Pods, Services, ConfigMaps, HPA and Ingress end-to-end.',
  tags:[{l:'Deployment',c:'#00e5ff'},{l:'HPA',c:'#a8ff3e'},{l:'Redis',c:'#b06dff'},{l:'Ingress',c:'#4db8ff'}],

  summary:{
    tagline:'A globally distributed link shortening service capable of handling 10,000 requests per second with sub-10ms p99 latency.',
    why:'This case study introduces every foundational K8s concept. You deploy a real API, configure Redis as a cache, expose it via Ingress with TLS, and watch autoscaling react to live load — all within a single namespace.',
    metrics:[{v:'10k',l:'RPS target'},{v:'<10ms',l:'p99 latency'},{v:'3',l:'replicas'},{v:'99.9%',l:'SLA'}],
    learns:[
      'Understand the Pod → ReplicaSet → Deployment ownership chain',
      'Differentiate ClusterIP, NodePort, and LoadBalancer Services',
      'Externalize config safely with ConfigMaps and Secrets',
      'Autoscale horizontally based on CPU and custom metrics',
      'Route external HTTPS traffic using Ingress + cert-manager',
      'Use Redis as a K8s StatefulSet with persistent storage',
    ]
  },

  arch:`
  ┌─────────────────────────────────────────────────────────┐
  │                   GKE CLUSTER                           │
  │                                                         │
  │  [Internet] ──→ [Cloud Load Balancer]                   │
  │                        │                                │
  │               [Ingress Controller]                      │
  │               nginx / GKE Ingress                       │
  │                        │                                │
  │          ┌─────────────┴──────────────┐                 │
  │          ↓                            ↓                 │
  │   [url-api Deployment]        [redirect-api]            │
  │   3 replicas → HPA(3-20)      1 replica                 │
  │          │                            │                 │
  │          └──────────┬─────────────────┘                 │
  │                     ↓                                   │
  │           [Redis StatefulSet]  ←──── [ConfigMap]        │
  │           cache + counters           (REDIS_HOST etc)   │
  │                     │                                   │
  │           [PostgreSQL StatefulSet]                      │
  │           persistent url store                          │
  └─────────────────────────────────────────────────────────┘`,

  blocks:[
    {icon:'📦',name:'Pod',kind:'Core',kindColor:'#00e5ff',
     sig:'The smallest deployable unit in Kubernetes. A Pod wraps one or more containers that share network and storage. The url-api runs as a single-container Pod managed by a Deployment.',
     why:'WHY: Kubernetes manages Pods, not containers directly. Understanding Pod lifecycle (Pending→Running→Succeeded/Failed) is critical for debugging.'},
    {icon:'🔁',name:'Deployment',kind:'Workload',kindColor:'#a8ff3e',
     sig:'Declares the desired state for your app: which image, how many replicas, update strategy. The controller loop continuously reconciles actual vs desired state.',
     why:'WHY: Never run bare Pods in production. Deployments give you rolling updates, rollback, and self-healing for free.'},
    {icon:'🌐',name:'Service',kind:'Network',kindColor:'#4db8ff',
     sig:'A stable virtual IP (ClusterIP) that load-balances across all matching Pods. Even as Pods come and go, the Service IP stays constant.',
     why:'WHY: Pod IPs are ephemeral. Services are the stable endpoint your other services and Ingress rely on.'},
    {icon:'⚙️',name:'ConfigMap',kind:'Config',kindColor:'#ffb830',
     sig:'Key-value store for non-sensitive configuration. Mount as env vars or files. The url-api reads REDIS_HOST, DB_PORT from here.',
     why:'WHY: Separating config from code means one image runs in dev, staging, and prod — only the ConfigMap changes.'},
    {icon:'🔐',name:'Secret',kind:'Config',kindColor:'#ff4d6d',
     sig:'Like ConfigMap but base64-encoded (and ideally encrypted at rest via KMS). Stores DB passwords, API keys. Never bake secrets into Docker images.',
     why:'WHY: Secrets can be rotated independently of code. With External Secrets Operator, they sync from GCP Secret Manager automatically.'},
    {icon:'📈',name:'HPA',kind:'Autoscale',kindColor:'#b06dff',
     sig:'Horizontal Pod Autoscaler watches CPU/memory metrics (or custom ones via KEDA) and scales replicas between minReplicas and maxReplicas.',
     why:'WHY: Traffic is unpredictable. HPA lets the system scale out during viral spikes and scale in at night to save cost.'},
    {icon:'🚪',name:'Ingress',kind:'Network',kindColor:'#00e5ff',
     sig:'An L7 HTTP router. Maps hostnames and paths to backend Services. Works with nginx, Traefik, or GKE\'s built-in Ingress.',
     why:'WHY: Without Ingress you\'d need one LoadBalancer per service (expensive). Ingress shares one LB across all routes.'},
    {icon:'🗂️',name:'Namespace',kind:'Isolation',kindColor:'#a8ff3e',
     sig:'A virtual cluster within a cluster. Provides scope for names and resource quotas. All url-shortener resources live in the url namespace.',
     why:'WHY: Namespaces prevent accidental cross-team interference and allow per-team ResourceQuotas and NetworkPolicies.'},
  ],

  phases:[
    {title:'Phase 1 — First Deployment',desc:'Ship a container to Kubernetes and understand the fundamental primitives.',tasks:[
      'Install kubectl + gcloud CLI, configure kubeconfig',
      'Create GKE Autopilot cluster: gcloud container clusters create-auto url-cluster',
      'Write Deployment YAML: 1 replica of url-api:latest',
      'Apply it: kubectl apply -f deployment.yaml',
      'Watch pods start: kubectl get pods -w',
      'Scale manually: kubectl scale deployment url-api --replicas=3',
      'Describe a pod: kubectl describe pod <name> — read Events section',
    ]},
    {title:'Phase 2 — Services & Networking',desc:'Expose your app inside and outside the cluster.',tasks:[
      'Create a ClusterIP Service for url-api (internal only)',
      'Test with port-forward: kubectl port-forward svc/url-api 8080:80',
      'Create a LoadBalancer Service — get external IP from EXTERNAL-IP column',
      'Deploy Redis and expose via headless Service (clusterIP: None)',

    {label:'Deployment',code:`apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-api
  namespace: url
  labels:
    app: url-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: url-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # allow 1 extra pod during rollout
      maxUnavailable: 0    # never take a pod down before a new one is ready
  template:
    metadata:
      labels:
        app: url-api
    spec:
      containers:
      - name: api
        image: gcr.io/my-project/url-api:v1.2.0
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: url-config    # inject all ConfigMap keys as env vars
        - secretRef:
            name: url-secrets
        resources:
          requests:
            cpu: "100m"         # 0.1 CPU — used for HPA calculations
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:         # only send traffic when this passes
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:          # restart if this fails 3 times
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          failureThreshold: 3`},

kind: Service
metadata:
  name: url-api
  namespace: url
spec:

---

kind: Ingress
metadata:
  name: url-ingress
  namespace: url

    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - s.yourdomain.com
    secretName: url-tls-cert   # cert-manager writes the cert here
  rules:
  - host: s.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: url-api

kind: HorizontalPodAutoscaler
metadata:
  name: url-api-hpa

spec:

    name: url-api

  - type: Resource

      name: memory

        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # react to spikes fast
    scaleDown:
      stabilizationWindowSeconds: 300  # don't scale down too quickly`},

    {label:'StatefulSet (PostgreSQL)',code:`apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: blob
spec:
  serviceName: "postgres"    # must match headless Service name
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: blob-ksa    # Workload Identity SA
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: blobstore
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:                # each pod gets its own PVC
  - metadata:
      name: pg-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: ssd            # your custom StorageClass
      resources:
        requests:
          storage: 20Gi`},
    {label:'RBAC — Role & RoleBinding',code:`# Role: scoped to team-a namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-a-role
  namespace: team-a
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "create", "update"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]              # can read but NOT delete

---
# RoleBinding: grant Role to ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-a-binding
  namespace: team-a
subjects:
- kind: ServiceAccount
  name: team-a-sa
  namespace: team-a
roleRef:
  kind: Role
  name: team-a-role
  apiGroup: rbac.authorization.k8s.io`},

apiVersion: v1
kind: ServiceAccount
metadata:
  name: blob-ksa
  namespace: blob
  annotations:

    iam.gke.io/gcp-service-account: blob-gsa@my-project.iam.gserviceaccount.com

---
# Step 2: GCP CLI commands to complete the binding
# (run outside cluster)
#
# gcloud iam service-accounts add-iam-policy-binding \\
#   blob-gsa@my-project.iam.gserviceaccount.com \\
#   --role roles/iam.workloadIdentityUser \\
#   --member "serviceAccount:my-project.svc.id.goog[blob/blob-ksa]"`},

kubectl apply -f - <<'EOF'
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ssd
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-ssd
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
EOF

# Create PVC
kubectl apply -f - <<'EOF'
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blob-data
spec:
  storageClassName: ssd
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
EOF`},

kubectl auth can-i get secrets \\
  -n team-b \\
  --as system:serviceaccount:team-a:team-a-sa
# Expected: no

# List all RoleBindings cluster-wide
kubectl get rolebindings -A

# Impersonate SA and try real kubectl command
kubectl get pods -n team-b \\
  --as system:serviceaccount:team-a:team-a-sa`},

    {label:'CronJob — Expire Reservations',code:`apiVersion: batch/v1
kind: CronJob
metadata:
  name: expire-reservations
  namespace: booking
spec:
  schedule: "*/5 * * * *"           # every 5 minutes
  concurrencyPolicy: Forbid          # don't overlap if previous still running
  startingDeadlineSeconds: 60        # skip if can't start within 60s
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2                # retry failed jobs up to 2 times
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: expiry-worker
            image: gcr.io/proj/booking-worker:latest
            command: ["/app/expire-reservations"]
            env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: db-host`},

kind: PodDisruptionBudget
metadata:
  name: booking-pdb
  namespace: booking
spec:
  # Always keep at least 2 pods running
  # Even during GKE node upgrades or kubectl drain
  minAvailable: 2
  selector:
    matchLabels:
      app: booking-api

# Note: set maxUnavailable instead if you prefer:
# maxUnavailable: 1  — allow at most 1 pod down at once`},

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: booking
spec:
  podSelector: {}          # applies to ALL pods in namespace
  policyTypes:
  - Ingress
  - Egress

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-booking-to-postgres

spec:

kind: VirtualService
metadata:
  name: frontend
  namespace: frontend
spec:
  hosts:
  - frontend-svc
  http:
  - name: canary-split
    route:
    - destination:
        host: frontend-svc
        subset: v1           # DestinationRule defines these subsets
      weight: 90             # 90% of traffic to stable version
    - destination:
        host: frontend-svc
        subset: v2
      weight: 10             # 10% canary traffic
    retries:
      attempts: 3
      perTryTimeout: 2s
    timeout: 10s

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: frontend
  namespace: frontend
spec:
  host: frontend-svc
  trafficPolicy:
    connectionPool:
      http:
        http1MaxPendingRequests: 100
  subsets:
  - name: v1
    labels:
      version: v1            # matches pods with label version=v1
  - name: v2
    labels:
      version: v2`},

kind: Rollout
metadata:
  name: frontend
  namespace: frontend
spec:
  replicas: 5
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
  strategy:
    canary:
      canaryService: frontend-canary-svc
      stableService: frontend-stable-svc
      analysis:
        templates:
        - templateName: success-rate    # Prometheus query
        startingStep: 2
      steps:
      - setWeight: 10          # 10% traffic to canary
      - pause: {duration: 5m}  # wait 5 minutes
      - setWeight: 30
      - pause: {duration: 5m}
      - setWeight: 60
      - pause: {duration: 5m}
      - setWeight: 100         # full rollout`},

metadata:

spec:

  syncPolicy:
    automated:
      prune: true                # delete resources removed from Git
      selfHeal: true             # re-apply if someone kubectl edits manually

    {label:'ChatRoom CRD',code:`apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chatrooms.messaging.io
spec:
  group: messaging.io
  names:
    kind: ChatRoom
    listKind: ChatRoomList
    plural: chatrooms
    singular: chatroom
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [name, maxSize]
            properties:
              name:
                type: string
              maxSize:
                type: integer
                minimum: 2
                maximum: 10000
              region:
                type: string
                enum: [us-central1, europe-west1]
          status:

                type: string   # Pending, Active, Degraded

    {label:'Operator Reconcile (Go)',code:`// ChatRoomReconciler — Kubebuilder generated scaffold
func (r *ChatRoomReconciler) Reconcile(
    ctx context.Context, req ctrl.Request) (ctrl.Result, error) {

  log := log.FromContext(ctx)

  // 1. Fetch the ChatRoom resource
  room := &messagingv1.ChatRoom{}
  if err := r.Get(ctx, req.NamespacedName, room); err != nil {
    return ctrl.Result{}, client.IgnoreNotFound(err)
  }

  // 2. Handle deletion — run cleanup before K8s deletes
  if !room.DeletionTimestamp.IsZero() {
    if controllerutil.ContainsFinalizer(room, "messaging.io/cleanup") {
      r.drainConnections(ctx, room)  // graceful disconnect
      controllerutil.RemoveFinalizer(room, "messaging.io/cleanup")
      r.Update(ctx, room)
    }
    return ctrl.Result{}, nil
  }

  // 3. Add finalizer on first reconcile
  controllerutil.AddFinalizer(room, "messaging.io/cleanup")

  // 4. Reconcile desired state — ensure pod exists
  pod := r.buildPodForRoom(room)
  if err := r.Create(ctx, pod); err != nil {
    room.Status.Phase = "Degraded"
  } else {
    room.Status.Phase = "Active"
    room.Status.ActiveConnections = 0
  }

  // 5. Update status
  r.Status().Update(ctx, room)
  log.Info("Reconciled ChatRoom", "name", room.Name)
  return ctrl.Result{RequeueAfter: 30 * time.Second}, nil
}`},

  yamls:[
    {label:'GPU Transcoding Job',code:`apiVersion: batch/v1
kind: Job
metadata:
  name: transcode-video-abc123
  namespace: transcoding
spec:
  parallelism: 4         # process all 4 resolutions simultaneously
  completions: 4
  backoffLimit: 2
  template:
    spec:
      priorityClassName: live-stream   # preempts batch jobs
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-gcs             # ensure source file is ready
        image: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
        command: ['sh', '-c',
          'until gsutil ls gs://raw-bucket/abc123.mp4; do sleep 2; done']
      containers:
      - name: transcoder
        image: gcr.io/proj/transcoder:latest
        resources:
          limits:
            nvidia.com/gpu: 1     # request 1 GPU
            memory: "8Gi"
          requests:
            nvidia.com/gpu: 1
            cpu: "4"
        env:
        - name: INPUT_PATH
          value: gs://raw-bucket/abc123.mp4
        - name: OUTPUT_BUCKET
          value: gs://transcoded-bucket
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"     # allow scheduling on GPU-tainted nodes
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4`},
    {label:'DaemonSet — Fluent Bit Log Collector',code:`apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:                   # run on ALL nodes, including GPU nodes
      - operator: Exists
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.2
        volumeMounts:
        - name: varlog
          mountPath: /var/log        # access node's log directory
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
      volumes:
      - name: varlog
        hostPath:
          path: /var/log             # mounts the NODE filesystem
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers`},
  ],

kind: PyTorchJob
metadata:
  name: image-classifier-training
  namespace: ml-platform
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
          - name: pytorch
            image: gcr.io/proj/trainer:latest
            args: ["--epochs=50", "--batch-size=256"]
            resources:
              limits:
                nvidia.com/gpu: 1
                memory: "16Gi"
            volumeMounts:
            - name: model-output
              mountPath: /output
          volumes:
          - name: model-output
            emptyDir: {}         # synced to GCS via sidecar
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
    Worker:
      replicas: 3              # 3 worker GPUs + 1 master = 4 GPU total
      restartPolicy: OnFailure
      template:
        spec:
          containers:
          - name: pytorch
            image: gcr.io/proj/trainer:latest
            resources:
              limits:

kind: InferenceService
metadata:

spec:

    pytorch:

      resources:
        limits:

  # storageUri: gs://models/image-classifier/v1
  transformer:

    {label:'Kong Plugins — JWT + Rate Limiting',code:`# JWT Authentication Plugin
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt-auth
  namespace: gateway
plugin: jwt
config:
  secret_is_base64: false
  key_claim_name: kid          # JWT header field for key lookup
  claims_to_verify:
  - exp                        # verify token not expired

---
# Rate Limiting Plugin (per consumer, uses Redis)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limit-standard
  namespace: gateway
plugin: rate-limiting
config:
  minute: 100                  # 100 requests per minute
  hour: 5000
  policy: redis                # distributed counter via Redis
  redis_host: redis.gateway.svc.cluster.local
  hide_client_headers: false   # show X-RateLimit-* headers to clients

---
# Apply plugins to Ingress via annotation
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: gateway
  annotations:
    konghq.com/plugins: jwt-auth,rate-limit-standard
spec:
  ingressClassName: kong
  rules:
  - host: api.yourdomain.com
    http:
      paths:
      - path: /v2/
        pathType: Prefix
        backend:
          service:
            name: api-v2-svc
            port:
              number: 80`},

# Install Kong Ingress Controller
helm install kong kong/ingress \\
  --namespace kong --create-namespace \\
  --set controller.ingressController.enabled=true \\
  --set proxy.type=LoadBalancer

# Wait for external IP
kubectl get svc -n kong kong-proxy -w

# Test gateway is live
curl -I http://$(kubectl get svc kong-proxy -n kong \\
  -o jsonpath='{.status.loadBalancer.ingress[0].ip}')/`},
  ]
},

    {label:'OPA ConstraintTemplate — No Root',code:`apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: norootcontainer
spec:
  crd:
    spec:
      names:
        kind: NoRootContainer
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package norootcontainer

      violation[{"msg": msg}] {
        # Check every container in the pod spec
        container := input.review.object.spec.containers[_]

        # Violation if runAsUser is 0 (root)
        container.securityContext.runAsUser == 0

        msg := sprintf("Container '%v' must not run as root (UID 0)", [container.name])
      }

      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]

        # Also violation if runAsNonRoot is not set to true
        not container.securityContext.runAsNonRoot == true

        msg := sprintf("Container '%v' must set runAsNonRoot: true", [container.name])
      }

---
# Apply the constraint to all namespaces
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: NoRootContainer
metadata:
  name: deny-root-containers
spec:
  enforcementAction: deny      # block at admission (use "warn" for audit-only)
  match:
    kinds:

apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    # Enforce Restricted PSS — blocks: root, hostNetwork, privilege escalation
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# SecretStore — connects to GCP Secret Manager via CSI
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: payment-secrets
  namespace: payments
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/my-proj/secrets/db-password/versions/latest"
        fileName: "db-password"
      - resourceName: "projects/my-proj/secrets/stripe-key/versions/latest"
        fileName: "stripe-api-key"

---
# Pod using CSI Secret Volume (never stored in etcd)
spec:
  volumes:
  - name: secrets-vol
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: payment-secrets
  containers:
  - name: payment-api
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]`},

  --enable-master-authorized-networks \\
  --master-authorized-networks=$(curl -s ifconfig.me)/32 \\
  --enable-binary-authorization \\
  --region=us-central1

# Create attestor for image signing
gcloud container binauthz attestors create payment-attester \\
  --attestation-authority-note=projects/my-proj/notes/payment-note \\
  --attestation-authority-note-project=my-proj

# Sign an image
gcloud artifacts sign-blob \\

# Apply your ConstraintTemplates and Constraints

# Audit existing violations
kubectl get notrootcontainer deny-root-containers \\

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let activeId = null;
let activeTab = 'summary';
let checked = {};
let openPhases = {};

const ranks = [
  [0,'🌱 Cluster Newbie'],
  [200,'🔧 Pod Pilot'],
  [500,'⚙️ YAML Engineer'],
  [1000,'🚀 K8s Engineer'],
  [2000,'🛡️ Platform Engineer'],
  [3500,'🏆 Cluster Architect'],
];

function getRank(xp) {
  let r = ranks[0][1];
  for (const [min,name] of ranks) if (xp >= min) r = name;
  return r;
}

function totalTasks() {
  return CASES.reduce((s,c) => s + c.phases.reduce((s2,p) => s2 + p.tasks.length, 0), 0);
}
function doneCount() { return Object.values(checked).filter(Boolean).length; }
function xpCount() { return doneCount() * 75; }

function updateXP() {
  const xp = xpCount();
  const done = doneCount();
  const total = totalTasks();
  const pct = Math.round((done / total) * 100);
  document.getElementById('xpFill').style.width = pct + '%';
  document.getElementById('xpVal').textContent = xp.toLocaleString() + ' XP';
  document.getElementById('xpRank').textContent = getRank(xp);
}

// ══════════════════════════════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════════════════════════════
function renderCards() {
  document.getElementById('caseGrid').innerHTML = CASES.map(c => {
    const bars = Array.from({length:3},(_,i) => `<div class="dbar${i<c.diff?' on':''}"></div>`).join('');
    const tags = c.tags.map(t => `<span class="ctag" style="color:${t.c};border-color:${t.c}44;background:${t.c}0d">${t.l}</span>`).join('');
    return `<div class="ccard${activeId===c.id?' sel':''}" 
      style="--cc:${c.cbg};--cc-border:${c.cborder}"
      onclick="selectCase('${c.id}')">
      <div class="cc-top">
        <div class="cc-ico" style="background:${c.cbg};color:${c.color}">${c.icon}</div>
        <div><div class="cc-name" style="color:${c.color}">${c.title}</div>
        <div class="cc-sub">${c.sub}</div></div>
      </div>
      <div class="cc-desc">${c.desc}</div>
      <div class="cc-tags">${tags}</div>
      <div class="cc-foot">
        <div class="cc-diff">${bars}<span class="dlbl">${c.dlbl}</span></div>
        <button class="cc-btn">${activeId===c.id?'Opened ↑':'Open →'}</button>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════
// SELECT CASE
// ══════════════════════════════════════════════════════════════
function selectCase(id) {
  if (activeId === id) { activeId = null; document.getElementById('detailPanel').classList.remove('on'); renderCards(); return; }
  activeId = id;
  activeTab = 'summary';
  renderCards();
  renderDetail();
  setTimeout(() => document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'start'}), 50);
}

function switchTab(t) { activeTab = t; renderDetail(); }

function togglePhase(key, e) {
  e.stopPropagation();
  openPhases[key] = !openPhases[key];
  const el = document.getElementById('ph-'+key);
  if (el) { el.classList.toggle('open', openPhases[key]); }
}

function toggleTask(key, e) {
  e.stopPropagation();
  checked[key] = !checked[key];
  const row = document.getElementById('tr-'+key);
  const tck = document.getElementById('tc-'+key);
  if (row) row.classList.toggle('done-row', checked[key]);
  if (tck) { tck.classList.toggle('done', checked[key]); tck.textContent = checked[key] ? '✓' : ''; }
  updateXP();
}

// ══════════════════════════════════════════════════════════════
// RENDER DETAIL
// ══════════════════════════════════════════════════════════════
function renderDetail() {
  const c = CASES.find(x => x.id === activeId);
  if (!c) return;
  const panel = document.getElementById('detailPanel');
  panel.classList.add('on');
  panel.style.setProperty('--d-accent', c.color);

  const tabs = ['summary','blocks','phases','yaml','commands'].map(t =>
    `<div class="tab${activeTab===t?' on':''}" onclick="switchTab('${t}')">${
      {summary:'Executive Summary',blocks:'Building Blocks',phases:'Hands-On Phases',yaml:'YAML Reference',commands:'Commands'}[t]
    }</div>`).join('');

  let body = '';

  // ── SUMMARY ──
  if (activeTab === 'summary') {
    const m = c.summary;
    body = `
    <div class="exec-bar">
      <p class="exec-para">${m.tagline}</p>
      <p class="exec-para">${m.why}</p>
    </div>
    <div class="highlight-row">
      ${m.metrics.map(x=>`<div class="hl-chip" style="border-color:${c.color}33;background:${c.cbg}"><b style="color:${c.color}">${x.v}</b><span>${x.l}</span></div>`).join('')}
    </div>
    <div class="exec-grid">
      <div class="exec-card">
        <div class="ec-label">What You Will Build</div>
        <div class="ec-val">${c.title}: ${c.sub}</div>
      </div>
      <div class="exec-card">
        <div class="ec-label">Difficulty Level</div>
        <div class="ec-val big" style="color:${c.color}">${c.dlbl}</div>
      </div>
    </div>
    <div class="exec-card" style="margin-bottom:16px">
      <div class="ec-label">K8s Concepts You Will Master</div>
      <ul class="learn-list" style="margin-top:10px">
        ${m.learns.map(l=>`<li>${l}</li>`).join('')}
      </ul>
    </div>
    <div class="exec-bar">
      <div class="ec-label" style="margin-bottom:12px">System Architecture Overview</div>
      <div class="arch-box"><pre>${c.arch}</pre></div>
    </div>`;
  }

  // ── BUILDING BLOCKS ──
  if (activeTab === 'blocks') {
    body = `<div class="bb-grid">${c.blocks.map(b=>`
      <div class="bb-card">
        <div class="bb-head">
          <span class="bb-icon">${b.icon}</span>
          <span class="bb-name">${b.name}</span>
          <span class="bb-kind" style="color:${b.kindColor};border-color:${b.kindColor}44;background:${b.kindColor}0d">${b.kind}</span>
        </div>
        <div class="bb-body">
          <p class="bb-sig">${b.sig}</p>
          <div class="bb-why" style="color:${c.color};background:${c.cbg};border-color:${c.color}22">${b.why}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  // ── PHASES ──
  if (activeTab === 'phases') {
    body = `<div class="phase-list">${c.phases.map((p,pi)=>{
      const k = `${c.id}-${pi}`;
      const isOpen = !!openPhases[k];
      return `<div class="phase${isOpen?' open':''}" id="ph-${k}">
        <div class="phase-hdr" onclick="togglePhase('${k}',event)">
          <div class="ph-num" style="background:${c.cbg};border-color:${c.color}44;color:${c.color}">${String(pi+1).padStart(2,'0')}</div>
          <div class="ph-info">
            <div class="ph-title">${p.title}</div>
            <div class="ph-desc">${p.desc}</div>
          </div>
          <div class="ph-chev">▶</div>
        </div>
        <div class="phase-body">
          ${p.tasks.map((t,ti)=>{
            const tk = `${k}-${ti}`;
            const done = !!checked[tk];
            return `<div class="task-row${done?' done-row':''}" id="tr-${tk}">
              <div class="tck${done?' done':''}" id="tc-${tk}" onclick="toggleTask('${tk}',event)">${done?'✓':''}</div>
              <span class="tck-text">${t}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  // ── YAML ──
  if (activeTab === 'yaml') {
    body = c.yamls.map(y=>`
      <div class="yaml-section">
        <div class="ys-label">${y.label}</div>
        <div class="code-block"><div class="cb-label">yaml</div><pre>${y.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/(#[^\n]*)/g,'<span class="cm">$1</span>')
          .replace(/\b(apiVersion|kind|metadata|spec|name|namespace|labels|selector|template|containers|image|ports|env|resources|limits|requests|replicas|strategy|type|volumeMounts|volumes|rules|subjects|roleRef|schedule|config|annotations|matchLabels|matchExpressions|operator|values|key|effect|tolerations|affinity|nodeAffinity|podAffinity)\b(?=:)/g,'<span class="ky">$1</span>')
        }</pre></div>
      </div>`).join('');
  }

  // ── COMMANDS ──
  if (activeTab === 'commands') {
    body = c.commands.map(cmd=>`
      <div class="yaml-section">
        <div class="ys-label">${cmd.label}</div>
        <div class="code-block"><div class="cb-label">bash</div><pre>${cmd.cmd.replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/(#[^\n]*)/g,'<span class="cm">$1</span>')
          .replace(/\b(kubectl|gcloud|helm|istioctl|kubebuilder|k6|curl|gsutil|make)\b/g,'<span class="op">$1</span>')
          .replace(/(--[\w-]+=?)/g,'<span class="kw">$1</span>')
          .replace(/\b(apply|get|create|delete|describe|logs|exec|run|scale|rollout|label|annotate|drain|patch|set|port-forward|install|upgrade|init)\b/g,'<span class="vl">$1</span>')
        }</pre></div>
      </div>`).join('');
  }

  panel.innerHTML = `
    <div class="d-hero" style="border-bottom-color:${c.color}33">
      <span class="d-ico">${c.icon}</span>
      <div class="d-info">
        <div class="d-title" style="color:${c.color}">${c.title}</div>
        <div class="d-sub">${c.sub} · ${c.dlbl}</div>
      </div>
      <button class="d-close" onclick="selectCase('${c.id}')">✕</button>
    </div>
    <div class="tabs">${tabs}</div>
    <div class="d-body">${body}</div>`;
}

// INIT
renderCards();
updateXP();
</script>
</body>
