apiVersion: batch/v1
kind: Job
metadata:
  name: pattern-worker-job
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: worker
        image: registry.k8s.io/e2e-test-images/busybox:1.29-2
        command: ["sh", "-c", "echo processing-task; sleep 3; echo task-complete"]
